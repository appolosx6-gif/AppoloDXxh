<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeFire Mod API - Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header h1 span {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #8892b0;
            margin-top: 8px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #ccd6f6;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #f7971e;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(247, 151, 30, 0.15);
        }

        .form-group input::placeholder {
            color: #495670;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            border-radius: 10px;
            color: #1a1a2e;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(247, 151, 30, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .response-section {
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 20px;
        }

        .response-section h3 {
            color: #ccd6f6;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .response-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            padding: 16px;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #e6f1ff;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .response-box .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .status-success {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 1px solid rgba(0, 255, 100, 0.3);
        }

        .status-error {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .status-loading {
            background: rgba(255, 255, 0, 0.2);
            color: #ffd700;
            border: 1px solid rgba(255, 255, 0, 0.3);
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: #ccd6f6;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .copy-btn.copied {
            background: rgba(0, 255, 100, 0.2);
            border-color: #00ff64;
            color: #00ff64;
        }

        .quick-fill {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .quick-fill button {
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #8892b0;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quick-fill button:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .url-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 14px;
            border-radius: 8px;
            color: #8892b0;
            font-size: 13px;
            margin-top: 10px;
            word-break: break-all;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .url-display strong {
            color: #ccd6f6;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .header h1 {
                font-size: 22px;
            }
        }

        /* Scrollbar styling */
        .response-box::-webkit-scrollbar {
            width: 6px;
        }

        .response-box::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .response-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ <span>FreeFire Mod</span> API</h1>
            <p>Test API endpoint untuk validasi mod</p>
        </div>

        <form id="apiForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="game">Game</label>
                    <input type="text" id="game" value="FreeFire" placeholder="Nama Game" required>
                </div>
                <div class="form-group">
                    <label for="user_key">User Key</label>
                    <input type="text" id="user_key" value="axpmod" placeholder="User Key" required>
                </div>
            </div>
            <div class="form-group">
                <label for="device">Device ID</label>
                <input type="text" id="device" placeholder="Masukkan Device ID" required>
                <div class="quick-fill">
                    <button type="button" onclick="fillDevice('99999')">Device 99999</button>
                    <button type="button" onclick="fillDevice('ABC123XYZ')">Device ABC123</button>
                    <button type="button" onclick="fillDevice('XYZ789')">Device XYZ789</button>
                    <button type="button" onclick="fillDevice('HWID-12345')">HWID Random</button>
                    <button type="button" onclick="generateRandomDevice()">🔀 Random</button>
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn">🚀 Kirim Request</button>
        </form>

        <div class="url-display">
            <strong>Endpoint:</strong> POST https://<span id="domain">nama-app-anda</span>.vercel.app/
        </div>

        <div class="response-section">
            <h3>📥 Response</h3>
            <div class="response-box" id="responseBox">
                <span style="color: #495670;">Belum ada request...</span>
            </div>
        </div>
    </div>

    <script>
        // Ambil domain dari URL saat ini
        const currentDomain = window.location.hostname;
        document.getElementById('domain').textContent = currentDomain;

        // Event listener form
        document.getElementById('apiForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const game = document.getElementById('game').value.trim();
            const user_key = document.getElementById('user_key').value.trim();
            const device = document.getElementById('device').value.trim();

            if (!device) {
                alert('Silakan masukkan Device ID!');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const responseBox = document.getElementById('responseBox');

            // Tampilkan loading
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Mengirim...';
            responseBox.innerHTML = `
                <span class="status-badge status-loading">⏳ LOADING</span>
                <span style="color: #8892b0;">Mengirim request ke server...</span>
            `;

            try {
                const response = await fetch('/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        game: game,
                        user_key: user_key,
                        device: device
                    })
                });

                const data = await response.json();

                // Format JSON dengan indentation
                const formattedJson = JSON.stringify(data, null, 2);

                // Cek status
                let statusBadge = '';
                if (data.status === true) {
                    statusBadge = `<span class="status-badge status-success">✅ SUCCESS</span>`;
                } else {
                    statusBadge = `<span class="status-badge status-error">❌ ERROR</span>`;
                }

                // Tampilkan response
                responseBox.innerHTML = `
                    ${statusBadge}
                    <button class="copy-btn" onclick="copyResponse()">📋 Copy</button>
                    <div id="responseContent">${formattedJson}</div>
                `;

            } catch (error) {
                responseBox.innerHTML = `
                    <span class="status-badge status-error">❌ ERROR</span>
                    <span style="color: #ff4444;">Error: ${error.message}</span>
                    <br><br>
                    <span style="color: #8892b0;">Pastikan server berjalan dan CORS diizinkan.</span>
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Kirim Request';
            }
        });

        // Fungsi untuk mengisi device
        function fillDevice(value) {
            document.getElementById('device').value = value;
            document.getElementById('device').focus();
        }

        // Fungsi untuk generate random device
        function generateRandomDevice() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 12; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('device').value = result;
            document.getElementById('device').focus();
        }

        // Fungsi copy response
        function copyResponse() {
            const content = document.getElementById('responseContent');
            if (!content) return;

            const text = content.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✅ Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copy';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                // Fallback
                const range = document.createRange();
                range.selectNode(content);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                document.execCommand('copy');
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✅ Copied!';
                setTimeout(() => {
                    btn.textContent = '📋 Copy';
                }, 2000);
            });
        }

        // Otomatis generate device saat halaman dimuat
        window.addEventListener('load', function() {
            generateRandomDevice();
        });
    </script>
</body>
</html>
